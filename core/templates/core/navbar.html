{% load static %}

<nav x-data="{ open: false}" class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <!-- Logo -->
            <a href="/" class="flex items-center">
                <img 
                    src="{% static 'img/logo.png' %}" 
                    alt="Minha Loja" 
                    loading="lazy"
                    class="logo-img"
                />
            </a>

            <!-- Desktop Menu -->
            <div class="hidden md:flex items-center space-x-8">
                <a href="{% url 'product_list' %}" class="text-gray-700 hover:text-indigo-600">Produtos</a>
                <a href="{% url 'category_list' %}" class="text-gray-700 hover:text-indigo-600">Categorias</a>
                
                {% if user.is_authenticated %}
                    <span class="text-indigo-600">Olá, {{ user.username }}</span>
                    <a href="{% url 'cart' %}" class="text-gray-700 hover:text-indigo-600 relative">
                        Carrinho
                        <span class="absolute -top-3 -right-4 bg-red-500 text-white text-xs rounded-full px-2 py-1">
                            {{ request.session.cart|length }}
                        </span>
                    </a>
                    <form action="{% url 'logout' %}" method="post" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="text-indigo-600 hover:text-indigo-800 font-medium">
                            Sair
                        </button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="text-gray-700 hover:text-indigo-600 relative">
                        Login
                    </a>
                    <a href="{% url 'register' %}" class="text-gray-700 hover:text-indigo-600 relative">
                        Cadastrar
                    </a>
                {% endif %}
            </div>

            <!-- Mobile Menu -->
            <div class="md:hidden flex items-center">
                <button @click="open = !open" class="text-gray-700 focus:outline-none">
                    <svg x-show="!open" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                    <svg x-show="open" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Mobile menu -->
    <div x-show="open" class="md:hidden bg-white border-t">
        <div class="px-2 pt-2 pb-3 space-y-1">
            <a href="#" class="block px-3 py-2 text-gray-700 hover:bg-gray-100">Produtos</a>
        </div>
    </div>
</nav>
