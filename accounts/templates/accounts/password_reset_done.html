{% extends 'core/base.html' %}

{% block title %}Email enviado{% endblock title %}

{% block content %}
    <div class="min-h-screen flex items-center justify-center bg-indigo-50 py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl border border-indigo-100 text-center">
            <h2 class="text-3xl font-bold text-indigo-700 mb-6">Link enviado!</h2>
            <p class="text-lg text-gray-700 mb-8">
                Verifique sua caixa de entrada (e spam) para o email com instruções de redefinição de senha.
            </p>
            <a href="{% url 'login' %}" class="inline-block bg-indigo-600 text-white font-bold py-3 px-8 rounded-full hover:bg-indigo-700 transition">
                Voltar ao login
            </a>
        </div>
    </div>
{% endblock content %}
